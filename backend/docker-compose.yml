version: '3.8'
services:
  db:
    image: ankane/pgvector:v0.5.1
    environment:
      - POSTGRES_USER=insuready
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=insuready_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
